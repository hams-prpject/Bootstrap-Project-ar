                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item">

            </div>
        </div>
    </nav>
    <div class="offcanvas offcanvas-start" tabindex="-1" id="navList" aria-labelledby="offcanvasExampleLabel">
        <div class="offcanvas-header py-5 border-bottom">
            <h5 class="offcanvas-title" id="offcanvasExampleLabel">
                <a class="navbar-brand" href="#" style="width: 40px; display: inline-block;">
                    <img src=" ./img/header/logo.png" alt="logo pic" class="w-100 ">
                    <h6 class="text-primary fs-3 d-inline-block">شفائك</h6>

            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <div class="navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item  ">
                        <a class="nav-link active" aria-current="page" href="#">الرئيسية</a>

                    <li class="nav-item ">

            <button class="btn btn-primary rounded-pill" type="button">تسجيل الدخول</button>
            <button class="btn btn-outline-primary rounded-pill" type="button">انشاء الحساب</button>
        </div>

    <!-- - header section  -->


    <!-- + hero section -->
    <main>
        <div class="container">
            <div class="row row-cols-1 row-cols-lg-2 py-5">
                <div class="col">
                    <div class="content">
                        <div
                            class="d-inline-flex gap-2 px-3 py-2 rounded-pill border border-primary border-opacity-25 bg-white shadow-sm">
                            <span class=" bg-primary rounded-circle" style="width: 20px; height: 20px;"></span>
                            <span class="font-bold ">مستقبلك الصحي يبدأ هنا</span>
                        </div>
                        <h1 class="my-4 fw-bold display-4">
                            استشارة طبية <br>
                            <div class="text-primary position-relative ">
                                <img class="position-absolute z-n1 top-100 translate-middle-y"
                                    src="./img/main/content/main.img.png" alt="">
                                <span class="">بلمسة زر واحدة</span>
                            </div>
                        </h1>
                        <p class="text-muted fs-5">
                            دع الذكاء الاصطناعي يحلل أعراضك ويوجهك لأفضل الأطباء المختصين.</p>

                        <div class="text-primary">
                            <span id="typing"></span>
                            <span class="heart"> I </span>
                        </div>
                        <form action="#"
                            class="d-flex justify-content-between gap-2 my-3 bg-white shadow-sm border border-primary border-opacity-25 p-3 rounded-4">
                            <img src="./img/main/content/doctor-icon.svg" alt="">
                            <input class="form-control border-0" type="search"
                                placeholder="اكتب الأعراض هنا (مثال: ألم في الرأس...)">
                            <button class="btn btn-primary rounded-3 text-nowrap">تشخيص الآن</button>
                        </form>

                    </div>
                </div>
                <div class="col position-relative">
                    <img class="img-fluid" src="./img/main/img/doctor-hero.png" alt="">
                    <img class="img-fluid position-absolute start-0 top-0 z-n1" src="./img/main/img/shape.svg" alt="">
                </div>

            </div>
    </main>
    <script src="./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const typingEl = document.querySelector('#typing');
        let x = 'رعاية صحية متكاملة.'
        let i = 0;
        let time = setInterval(_ => {
            if (i === x.length - 1) {
                clearInterval(time)
            }
            typingEl.innerText += x[i]
            i++;
        }
            , 100)

    </script>
</body>

</html>
